<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>木製ゲームDX - アルティメット完全版</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700&display=swap');
        :root {
            --wood-dark: #4e342e; --wood-medium: #795548; --wood-light: #d7ccc8; 
            --bg: #2a1b15; --accent: #ffd54f; --danger: #ef5350; --success: #66bb6a;
        }
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif; background: var(--bg);
            background-image: radial-gradient(circle, #4e342e 10%, transparent 10%), radial-gradient(circle, #4e342e 10%, transparent 10%);
            background-size: 20px 20px; background-position: 0 0, 10px 10px;
            color: #efebe9; display: flex; flex-direction: column; align-items: center; margin: 0; overflow: hidden; user-select: none;
        }
        .screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; width: 100%; position: absolute; top: 0; left: 0;
            transition: opacity 0.3s ease, transform 0.3s ease; opacity: 1; transform: scale(1);
        }
        .hidden { opacity: 0; transform: scale(0.95) translateY(20px); pointer-events: none; z-index: -1; }
        
        .mode-box {
            background: linear-gradient(135deg, var(--wood-medium), var(--wood-dark));
            padding: 30px; border-radius: 16px; border: 6px solid #3e2723;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 15px 35px rgba(0,0,0,0.8); text-align: center; min-width: 360px;
        }
        h1 { color: var(--accent); text-shadow: 0 4px 10px rgba(0,0,0,0.8), 0 2px 2px #000; margin-bottom: 25px; font-size: 52px; letter-spacing: 2px;}
        h2 { color: var(--wood-light); font-size: 28px; margin-bottom: 20px; text-shadow: 2px 2px 4px #000; }
        
        .btn {
            padding: 15px 30px; font-size: 18px; cursor: pointer; display: block; width: calc(100% - 20px); box-sizing: border-box;
            background: linear-gradient(to bottom, #a1887f, #6d4c41); border: 2px solid #3e2723; border-radius: 8px; 
            color: white; font-weight: bold; margin: 10px auto; box-shadow: 0 6px 0 #2a1b15, 0 10px 15px rgba(0,0,0,0.4); 
            transition: all 0.1s; font-family: 'M PLUS Rounded 1c', sans-serif;
        }
        .btn:hover { filter: brightness(1.1); transform: translateY(2px); box-shadow: 0 4px 0 #2a1b15, 0 5px 10px rgba(0,0,0,0.4); }
        .btn:active { transform: translateY(6px); box-shadow: 0 0 0 #2a1b15, inset 0 3px 5px rgba(0,0,0,0.5); }
        .btn-green { background: linear-gradient(to bottom, #81c784, #388e3c); }
        .btn-blue { background: linear-gradient(to bottom, #64b5f6, #1976d2); }

        /* キャンバス（迷路） */
        canvas {
            background: #bcaaa4; border: 8px solid #3e2723; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        .canvas-container { display: flex; gap: 30px; margin-top: 10px; }
        .player-label { text-align: center; font-size: 18px; margin-top: 8px; font-weight: bold; text-shadow: 1px 1px 2px #000; }
        
        /* フラッシュ & 記憶力 */
        #flash-display { font-size: 110px; height: 150px; line-height: 150px; color: var(--accent); text-shadow: 5px 5px 0 #000, 0 0 30px var(--accent); font-weight: bold; }
        input { font-size: 24px; padding: 12px; width: 220px; text-align: center; border-radius: 8px; border: 4px solid var(--wood-medium); margin: 15px; background: #efebe9; font-family: 'M PLUS Rounded 1c', sans-serif; font-weight: bold;}
        input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 15px var(--accent); }
        
        #memory-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; }
        .tile { width: 70px; height: 70px; background: #6d4c41; border-radius: 12px; cursor: pointer; border: 3px solid #2a1b15; box-shadow: 0 6px 0 #3e2723; transition: all 0.1s; }
        .tile:active { transform: translateY(6px); box-shadow: 0 0 0 #3e2723; }
        .tile.active { background: var(--accent) !important; box-shadow: 0 0 30px var(--accent), inset 0 0 15px #fff; border-color: #fff; transform: scale(1.05); }

        /* ステータステキスト */
        .status-txt { font-size: 26px; margin: 10px; height: 40px; color: #fff; font-weight: bold; text-shadow: 2px 2px 4px #000; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; text-shadow: 0 0 15px var(--accent); } 100% { opacity: 0.8; } }
    </style>
</head>
<body>

    <div id="top-menu" class="screen">
        <h1>木製ゲームDX</h1>
        <div class="mode-box">
            <button class="btn btn-blue" onclick="showScreen('online-menu')">🌐 オンライン迷路対戦</button>
            <button class="btn" onclick="showScreen('cat-offline-menu')">🤖 AI迷路対戦</button>
            <button class="btn" onclick="showScreen('flash-menu')">⚡ フラッシュ暗算</button>
            <button class="btn" onclick="showScreen('memory-menu')">🧠 記憶力タイル</button>
        </div>
    </div>

    <div id="online-menu" class="screen hidden">
        <h2>🌐 オンライン迷路対戦</h2>
        <div class="mode-box">
            <button class="btn btn-green" onclick="onCat_createRoom()">部屋を作る (ホスト)</button>
            <div style="margin: 20px 0; font-weight: bold;">または</div>
            <input type="text" id="join-room-id" placeholder="合言葉を入力" autocomplete="off">
            <button class="btn btn-blue" onclick="onCat_joinRoom()">部屋に入る (ゲスト)</button>
            <button class="btn" style="margin-top:25px; opacity: 0.8; background: #795548;" onclick="showScreen('top-menu')">◀ メニューに戻る</button>
        </div>
    </div>

    <div id="online-game" class="screen hidden">
        <div id="onCat-status" class="status-txt">接続中...</div>
        <div id="onCat-room-info" style="font-size: 20px; color: var(--accent); font-weight: bold; margin-bottom: 15px;"></div>
        <div class="canvas-container">
            <div><canvas id="onCat-pCanvas" width="320" height="320"></canvas><div class="player-label" style="color:var(--accent)">あなた</div></div>
            <div><canvas id="onCat-aCanvas" width="320" height="320"></canvas><div class="player-label">あいて</div></div>
        </div>
        <button class="btn" style="margin-top: 30px; width: 250px; background: #d32f2f;" onclick="location.reload()">対戦をやめる</button>
    </div>

    <div id="cat-offline-menu" class="screen hidden">
        <h2>🤖 AI迷路対戦</h2>
        <div class="mode-box">
            <button class="btn btn-green" onclick="offCat_start(900)">初級 (ゆっくり)</button>
            <button class="btn btn-blue" onclick="offCat_start(600)">中級 (ふつう)</button>
            <button class="btn" style="background: linear-gradient(to bottom, #e53935, #b71c1c);" onclick="offCat_start(300)">上級 (激ムズ)</button>
            <button class="btn" style="margin-top:25px; opacity: 0.8; background: #795548;" onclick="showScreen('top-menu')">◀ メニューに戻る</button>
        </div>
    </div>

    <div id="cat-offline-game" class="screen hidden">
        <div id="offCat-status" class="status-txt">準備完了</div>
        <div class="canvas-container">
            <div><canvas id="offCat-pCanvas" width="320" height="320"></canvas><div class="player-label" style="color:var(--accent)">あなた</div></div>
            <div><canvas id="offCat-aCanvas" width="320" height="320"></canvas><div class="player-label">AIねこ</div></div>
        </div>
        <div style="margin-top: 25px; display: flex; gap: 10px;">
            <button class="btn" style="width: 150px;" onclick="offCat_generate()">🔄 次のステージ</button>
            <button class="btn" style="width: 150px; opacity: 0.8; background: #795548;" onclick="showScreen('cat-offline-menu')">◀ 戻る</button>
        </div>
    </div>

    <div id="flash-menu" class="screen hidden">
        <h2>⚡ フラッシュ暗算</h2>
        <div class="mode-box">
            <button class="btn" onclick="startFlash(1)">レベル 1 (かんたん)</button>
            <button class="btn" onclick="startFlash(3)">レベル 3 (ふつう)</button>
            <button class="btn" onclick="startFlash(5)">レベル 5 (むずかしい)</button>
            <button class="btn" style="margin-top:25px; opacity: 0.8; background: #795548;" onclick="showScreen('top-menu')">◀ メニューに戻る</button>
        </div>
    </div>

    <div id="flash-game" class="screen hidden">
        <div class="mode-box" style="padding: 50px;">
            <div id="flash-display">準備...</div>
            <div id="flash-answer-area" class="hidden">
                <input type="number" id="flash-input" placeholder="合計は？">
                <button class="btn btn-green" onclick="checkFlashAnswer()">決定</button>
            </div>
            <button class="btn" style="margin-top:40px; opacity: 0.8; background: #795548;" onclick="showScreen('flash-menu')">◀ やめる</button>
        </div>
    </div>

    <div id="memory-menu" class="screen hidden">
        <h2>🧠 記憶力タイル</h2>
        <div class="mode-box">
            <div id="mem-status" class="status-txt" style="margin-bottom: 20px;">レベルを選択</div>
            <div id="memory-grid"></div>
            <div id="mem-setup" style="margin-top:25px;">
                <button class="btn" onclick="startMemory(4)">初級 (4つ)</button>
                <button class="btn" onclick="startMemory(6)">中級 (6つ)</button>
                <button class="btn" onclick="startMemory(9)">上級 (9つ)</button>
                <button class="btn" style="margin-top:25px; opacity: 0.8; background: #795548;" onclick="showScreen('top-menu')">◀ メニューに戻る</button>
            </div>
        </div>
    </div>

    <script type="module">
        // --- Firebase SDK 読み込み ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 宇治さんの設定コード
        const firebaseConfig = {
            apiKey: "AIzaSyC0Kcn330WSPc9COXDtKaRwwjiL8SbzDVI",
            authDomain: "wooden-games-fc1ce.firebaseapp.com",
            projectId: "wooden-games-fc1ce",
            storageBucket: "wooden-games-fc1ce.firebasestorage.app",
            messagingSenderId: "55529711793",
            appId: "1:55529711793:web:e1cff88c0b0051c0ab1a90",
            databaseURL: "https://wooden-games-fc1ce-default-rtdb.firebaseio.com"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- グローバル変数・システム ---
        let activeGame = null; // 現在遊んでいるゲーム('onlineCat', 'offlineCat', 'flash', 'memory')
        const GRID_SIZE = 8, CELL_SIZE = 40;

        // --- 🎵 サウンドエンジン (Web Audio API) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        window.playSound = (type) => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'move') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(600, now + 0.05);
                gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'win') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(440, now); osc.frequency.setValueAtTime(554, now+0.1); osc.frequency.setValueAtTime(659, now+0.2); osc.frequency.setValueAtTime(880, now+0.3);
                gainNode.gain.setValueAtTime(0.2, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.8);
                osc.start(now); osc.stop(now + 0.8);
            } else if (type === 'lose') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(50, now + 0.5);
                gainNode.gain.setValueAtTime(0.2, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.5);
                osc.start(now); osc.stop(now + 0.5);
            } else if (type === 'click') {
                osc.type = 'square'; osc.frequency.setValueAtTime(800, now);
                gainNode.gain.setValueAtTime(0.05, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                osc.start(now); osc.stop(now + 0.05);
            }
        };

        // --- 画面切り替え ---
        window.showScreen = (id) => {
            playSound('click');
            document.querySelectorAll('.screen').forEach(el => el.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            activeGame = null;
            if(id === 'cat-offline-menu') activeGame = 'offlineMenu';
            if(id === 'flash-menu') document.getElementById('flash-input').value = "";
        };

        // --- 🎨 共通描画ロジック ---
        function renderMaze(ctx, board, path, isPlayer) {
            ctx.clearRect(0, 0, 320, 320);
            for(let y=0; y<GRID_SIZE; y++) {
                for(let x=0; x<GRID_SIZE; x++) {
                    ctx.strokeStyle = "rgba(0,0,0,0.15)"; ctx.strokeRect(x*CELL_SIZE, y*CELL_SIZE, CELL_SIZE, CELL_SIZE);
                    if(board[y][x] === 2) { ctx.fillStyle="#4e342e"; ctx.fillRect(x*CELL_SIZE, y*CELL_SIZE, CELL_SIZE, CELL_SIZE); } // 壁
                    else if(x===0 && y===0) { ctx.fillStyle="rgba(102, 187, 106, 0.4)"; ctx.fillRect(x*CELL_SIZE, y*CELL_SIZE, CELL_SIZE, CELL_SIZE); } // スタート
                    else if(x===7 && y===7) { ctx.fillStyle="rgba(255, 213, 79, 0.4)"; ctx.fillRect(x*CELL_SIZE, y*CELL_SIZE, CELL_SIZE, CELL_SIZE); } // ゴール
                }
            }
            // 軌跡の描画
            path.forEach((p, i) => {
                const isHead = i === path.length - 1;
                ctx.fillStyle = isPlayer ? (isHead ? "#ffd54f" : "#ffecb3") : (isHead ? "#90caf9" : "#e3f2fd");
                ctx.beginPath(); ctx.roundRect(p.x*CELL_SIZE+4, p.y*CELL_SIZE+4, CELL_SIZE-8, CELL_SIZE-8, 6); ctx.fill();
                if(isHead) { // 目を描く
                    ctx.fillStyle = "#3e2723";
                    ctx.beginPath(); ctx.arc(p.x*CELL_SIZE+12, p.y*CELL_SIZE+16, 3, 0, 7); ctx.arc(p.x*CELL_SIZE+28, p.y*CELL_SIZE+16, 3, 0, 7); ctx.fill();
                }
            });
        }

        function generateMazeArray() {
            let b = Array.from({length:GRID_SIZE}, () => Array(GRID_SIZE).fill(0));
            // 簡易的にランダムな壁を配置（必ずゴールできるとは限らない簡略版）
            for(let i=0; i<15; i++) {
                let rx=Math.floor(Math.random()*GRID_SIZE), ry=Math.floor(Math.random()*GRID_SIZE);
                if((rx!==0 || ry!==0) && (rx!==7 || ry!==7)) b[ry][rx] = 2;
            }
            return b;
        }

        // ==========================================
        // 🌐 オンライン迷路対戦ロジック
        // ==========================================
        let onRoomId = "", onMyRole = "", onBoard = [], onPath = [], onOppPath = [], onIsOver = false;
        
        window.onCat_createRoom = async () => {
            playSound('click');
            onRoomId = Math.floor(1000 + Math.random() * 9000).toString();
            onMyRole = "p1";
            document.getElementById('onCat-room-info').innerText = "🔑 合言葉: " + onRoomId;
            document.getElementById('onCat-status').innerText = "対戦相手を待っています...";
            showScreen('online-game'); activeGame = 'onlineCat'; onIsOver = false; onPath = [{x:0, y:0}]; onOppPath = [{x:0, y:0}];
            
            onBoard = generateMazeArray();
            await set(ref(db, `rooms/${onRoomId}`), { board: JSON.stringify(onBoard), p1: {x:0, y:0}, status: "waiting" });
            
            // 自分が切断した時に部屋を消す
            onDisconnect(ref(db, `rooms/${onRoomId}`)).remove();
            onCat_listen();
        };

        window.onCat_joinRoom = () => {
            playSound('click');
            onRoomId = document.getElementById('join-room-id').value;
            if(!onRoomId) return alert("合言葉を入力してください");
            onMyRole = "p2";
            document.getElementById('onCat-room-info').innerText = "🔑 合言葉: " + onRoomId;
            document.getElementById('onCat-status').innerText = "接続しました！";
            showScreen('online-game'); activeGame = 'onlineCat'; onIsOver = false; onPath = [{x:0, y:0}]; onOppPath = [{x:0, y:0}];
            
            set(ref(db, `rooms/${onRoomId}/p2`), {x:0, y:0});
            set(ref(db, `rooms/${onRoomId}/status`), "playing");
            onDisconnect(ref(db, `rooms/${onRoomId}/p2`)).remove();
            onCat_listen();
        };

        function onCat_listen() {
            onValue(ref(db, `rooms/${onRoomId}`), (snap) => {
                const data = snap.val();
                if(!data) { document.getElementById('onCat-status').innerText = "相手が切断しました"; onIsOver = true; return; }
                
                if(data.board && onBoard.length === 0) onBoard = JSON.parse(data.board);
                if(data.status === "playing" && !onIsOver) document.getElementById('onCat-status').innerText = "🔥 対戦中！ゴールを目指せ！";

                const oppRole = onMyRole === "p1" ? "p2" : "p1";
                if(data[oppRole]) {
                    // 相手の移動を反映
                    if(onOppPath.length === 0 || onOppPath[onOppPath.length-1].x !== data[oppRole].x || onOppPath[onOppPath.length-1].y !== data[oppRole].y) {
                        onOppPath.push({x: data[oppRole].x, y: data[oppRole].y});
                    }
                }
                
                if(data.winner && !onIsOver) {
                    onIsOver = true;
                    if(data.winner === onMyRole) { document.getElementById('onCat-status').innerText = "🎉 あなたの勝利！"; playSound('win'); }
                    else { document.getElementById('onCat-status').innerText = "💀 相手の勝利..."; playSound('lose'); }
                }
                onCat_render();
            });
        }

        function onCat_render() {
            const pCtx = document.getElementById('onCat-pCanvas').getContext('2d');
            const aCtx = document.getElementById('onCat-aCanvas').getContext('2d');
            if(onBoard.length > 0) {
                renderMaze(pCtx, onBoard, onPath, true);
                renderMaze(aCtx, onBoard, onOppPath, false);
            }
        }

        // ==========================================
        // 🤖 AI迷路対戦ロジック (オフライン)
        // ==========================================
        let offBoard=[], offPath=[], offAiPath=[], offAiFullRoute=[], offIsOver=false, offAiTimer=null, offSpeed=500;
        
        window.offCat_start = (speed) => {
            offSpeed = speed;
            showScreen('cat-offline-game'); activeGame = 'offlineCat';
            offCat_generate();
        };

        // 確実な迷路とAIの正解ルートを生成する関数
        async function buildSolvableMaze() {
            let b = Array.from({length:GRID_SIZE}, () => Array(GRID_SIZE).fill(2)); // 全て壁
            let pathSet = new Set(["0,0"]); let route = [{x:0, y:0}]; b[0][0] = 0;
            
            // 穴掘り法でゴール(7,7)までのルートを作る（超簡易版）
            let cx=0, cy=0;
            while(cx<7 || cy<7) {
                let dirs = [];
                if(cx<7) dirs.push({dx:1, dy:0}); if(cy<7) dirs.push({dx:0, dy:1});
                let d = dirs[Math.floor(Math.random()*dirs.length)];
                cx+=d.dx; cy+=d.dy;
                b[cy][cx] = 0; pathSet.add(`${cx},${cy}`); route.push({x:cx, y:cy});
            }
            // ランダムな空き地を追加
            for(let i=0; i<30; i++) {
                let rx=Math.floor(Math.random()*GRID_SIZE), ry=Math.floor(Math.random()*GRID_SIZE);
                b[ry][rx] = 0;
            }
            return { board: b, solution: route };
        }

        window.offCat_generate = async () => {
            playSound('click'); clearInterval(offAiTimer); offIsOver = false;
            document.getElementById('offCat-status').innerText = "🔥 スタート！";
            offPath = [{x:0, y:0}]; offAiPath = [{x:0, y:0}];
            const data = await buildSolvableMaze();
            offBoard = data.board; offAiFullRoute = data.solution;
            
            offCat_render();
            let aiIdx = 1;
            offAiTimer = setInterval(() => {
                if(offIsOver) return clearInterval(offAiTimer);
                if(aiIdx < offAiFullRoute.length) {
                    offAiPath.push(offAiFullRoute[aiIdx]); aiIdx++;
                    playSound('move'); offCat_render();
                    if(offAiFullRoute[aiIdx-1].x === 7 && offAiFullRoute[aiIdx-1].y === 7) {
                        offIsOver = true; document.getElementById('offCat-status').innerText = "💀 AIの勝利..."; playSound('lose');
                    }
                }
            }, offSpeed);
        };

        function offCat_render() {
            renderMaze(document.getElementById('offCat-pCanvas').getContext('2d'), offBoard, offPath, true);
            renderMaze(document.getElementById('offCat-aCanvas').getContext('2d'), offBoard, offAiPath, false);
        }

        // ==========================================
        // ⚡ フラッシュ暗算ロジック
        // ==========================================
        let flashSum = 0;
        window.startFlash = (lv) => {
            showScreen('flash-game'); activeGame = 'flash';
            document.getElementById('flash-answer-area').classList.add('hidden');
            const display = document.getElementById('flash-display');
            display.style.color = "var(--accent)";
            
            const count = 3 + lv; 
            const speed = 1000 - (lv * 120); 
            const range = lv * 10;
            flashSum = 0; let currentCount = 0;
            display.innerText = "3"; playSound('click');
            
            setTimeout(() => { display.innerText = "2"; playSound('click'); }, 1000);
            setTimeout(() => { display.innerText = "1"; playSound('click'); }, 2000);
            setTimeout(() => {
                const interval = setInterval(() => {
                    if (currentCount < count) {
                        let num = Math.floor(Math.random() * range) + 1;
                        display.innerText = num; flashSum += num; currentCount++; playSound('move');
                    } else {
                        clearInterval(interval);
                        display.innerText = "？"; playSound('click');
                        document.getElementById('flash-answer-area').classList.remove('hidden');
                        document.getElementById('flash-input').focus();
                    }
                }, speed);
            }, 3000);
        };

        window.checkFlashAnswer = () => {
            const ans = parseInt(document.getElementById('flash-input').value);
            const display = document.getElementById('flash-display');
            document.getElementById('flash-answer-area').classList.add('hidden');
            if (ans === flashSum) {
                display.innerText = "大正解！"; display.style.color = "var(--success)"; playSound('win');
            } else {
                display.innerText = "残念: " + flashSum; display.style.color = "var(--danger)"; playSound('lose');
            }
        };

        // ==========================================
        // 🧠 記憶力タイルロジック
        // ==========================================
        let memSequence = [], memUserSeq = [], memIsInput = false;
        const memGrid = document.getElementById('memory-grid');
        for(let i=0; i<16; i++) {
            const d = document.createElement('div'); d.className = 'tile';
            d.onclick = () => mem_handleTile(i); memGrid.appendChild(d);
        }

        window.startMemory = async (len) => {
            showScreen('memory-menu'); activeGame = 'memory'; memIsInput = false; memSequence = []; memUserSeq = [];
            document.getElementById('mem-status').innerText = "順番を覚えてね..."; document.getElementById('mem-setup').classList.add('hidden');
            for(let i=0; i<len; i++) memSequence.push(Math.floor(Math.random()*16));
            
            const tiles = document.querySelectorAll('.tile');
            await new Promise(r => setTimeout(r, 1000));
            for(let idx of memSequence) {
                playSound('click'); tiles[idx].classList.add('active');
                await new Promise(r => setTimeout(r, 400));
                tiles[idx].classList.remove('active');
                await new Promise(r => setTimeout(r, 200));
            }
            memIsInput = true; document.getElementById('mem-status').innerText = "順番にタップ！";
        };

        function mem_handleTile(i) {
            if(!memIsInput) return;
            const tiles = document.querySelectorAll('.tile');
            playSound('move'); tiles[i].classList.add('active');
            setTimeout(() => tiles[i].classList.remove('active'), 200);
            memUserSeq.push(i);

            if(memUserSeq[memUserSeq.length-1] !== memSequence[memUserSeq.length-1]) {
                document.getElementById('mem-status').innerText = "失敗..."; memIsInput = false; playSound('lose');
                setTimeout(() => { document.getElementById('mem-status').innerText="レベルを選択"; document.getElementById('mem-setup').classList.remove('hidden'); }, 2000);
            } else if(memUserSeq.length === memSequence.length) {
                document.getElementById('mem-status').innerText = "完璧！クリア！"; memIsInput = false; playSound('win');
                setTimeout(() => { document.getElementById('mem-status').innerText="レベルを選択"; document.getElementById('mem-setup').classList.remove('hidden'); }, 2000);
            }
        }

        // ==========================================
        // 共通キーボード操作処理 (迷路ゲーム用)
        // ==========================================
        window.addEventListener('keydown', (e) => {
            // 現在アクティブな迷路ゲームの種類を取得
            let isOnline = (activeGame === 'onlineCat');
            let isOffline = (activeGame === 'offlineCat');
            if(!isOnline && !isOffline) return;
            
            let board = isOnline ? onBoard : offBoard;
            let path = isOnline ? onPath : offPath;
            let isOver = isOnline ? onIsOver : offIsOver;
            
            if(isOver || board.length === 0) return;

            let dx=0, dy=0;
            if(e.key === "ArrowUp") { dy=-1; e.preventDefault(); }
            if(e.key === "ArrowDown") { dy=1; e.preventDefault(); }
            if(e.key === "ArrowLeft") { dx=-1; e.preventDefault(); }
            if(e.key === "ArrowRight") { dx=1; e.preventDefault(); }
            
            if(dx!==0 || dy!==0) {
                let last = path[path.length-1];
                let nx = last.x + dx, ny = last.y + dy;
                // 移動可能判定
                if(nx>=0 && nx<GRID_SIZE && ny>=0 && ny<GRID_SIZE && board[ny][nx]===0) {
                    path.push({x:nx, y:ny}); playSound('move');
                    
                    if(isOnline) {
                        set(ref(db, `rooms/${onRoomId}/${onMyRole}`), {x:nx, y:ny});
                        if(nx===7 && ny===7) set(ref(db, `rooms/${onRoomId}/winner`), onMyRole);
                        onCat_render();
                    } else {
                        offCat_render();
                        if(nx===7 && ny===7) {
                            offIsOver = true; clearInterval(offAiTimer); playSound('win');
                            document.getElementById('offCat-status').innerText = "🎉 あなたの勝利！";
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
